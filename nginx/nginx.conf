###############################################################################
# nginx.conf — xCloudVLMUI 反向代理
# 架構（HTTP）：
#   :80       → Next.js  :3000  (前端)
#   /api      → FastAPI  :8000  (後端)
#   /vlm      → vlm-webui :8090  (VLM WebUI，WebRTC 需要)
#   /mqtt     → mosquitto :9001  (MQTT over WebSocket)
# 架構（TCP Stream）：
#   :1883     → mosquitto :1883  (MQTT over TCP)
###############################################################################

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # 上傳大小限制（文件上傳用）
    client_max_body_size 50M;

    # Docker 內建 DNS resolver（動態解析服務名稱，避免啟動順序問題）
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── 上游服務 ────────────────────────────────────────────────────
    upstream nextjs {
        server frontend:3000;
        keepalive 16;
    }

    upstream fastapi {
        server backend:8000;
        keepalive 16;
    }

    upstream vlm_webui {
        server vlm-webui:8090;
    }

    # ── 允許連線 HTTPS 上游 ─────────────────────────────────────────
    proxy_ssl_verify off;

    # ── 主 Server Block ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── NextAuth.js 認證路由（必須優先於 /api/）──────────────────
        # NextAuth 的 /api/auth/* 由 Next.js 處理，不轉發給 FastAPI
        location /api/auth/ {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # ── FastAPI 後端 (/api/*) ───────────────────────────────────
        location /api/ {
            # 在請求階段保存 client Host（含 port），供 proxy_redirect 使用
            set $client_host $http_host;
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $http_host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            # 修正 FastAPI 307 redirect：將內部 host 還原為 client 請求的 host+port
            proxy_redirect     ~^http://[^/]*(/.*)$ http://$client_host$1;
        }

        # ── FastAPI Swagger Docs ────────────────────────────────────
        location ~ ^/(docs|redoc|openapi.json) {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
        }

        # ── Prometheus Metrics（3.3 監控與可觀測性）──────────────
        # 端點：GET /metrics → FastAPI prometheus-fastapi-instrumentator
        # ⚠️  生產環境建議加入 IP 白名單限制（僅允許監控服務 scrape）
        # allow 192.168.0.0/16;   # 工廠內網
        # deny  all;
        location /metrics {
            proxy_pass         http://fastapi;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 10s;
        }

        # ── MQTT over WebSocket (/mqtt) ─────────────────────────────
        # 前端或外部工具可用 ws://localhost:8880/mqtt 連線
        location /mqtt {
            proxy_pass         http://mosquitto:9001;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── live-vlm-webui (/vlm/*) ────────────────────────────────
        # 移除 /vlm 前綴後轉發（vlm-webui 預設使用自簽 SSL）
        location /vlm/ {
            # 使用動態 DNS 解析，避免 vlm-webui 容器重建後 IP 變動導致 502
            set                $vlm_upstream https://vlm-webui:8090;
            # 變數 proxy_pass 會丟失 prefix 後綴；先 rewrite 再原樣轉發
            rewrite            ^/vlm/(.*)$ /$1 break;
            proxy_pass         $vlm_upstream$uri$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            # WebRTC ICE 需要長連線
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── live-vlm-webui 根路徑 API 轉發（供 /vlm 頁面內絕對路徑呼叫） ──
        # live-vlm-webui 前端會呼叫 /offer /ws /models /detect-services /api/rtsp/*
        # 若不顯式轉發，會被 Next.js/FastAPI 接走，導致模型清單缺失與 RTSP JSON parse error
        location = /offer {
            set                $vlm_upstream https://vlm-webui:8090;
            proxy_pass         $vlm_upstream/offer;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /ws {
            set                $vlm_upstream https://vlm-webui:8090;
            proxy_pass         $vlm_upstream/ws;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /models {
            set                $vlm_upstream https://vlm-webui:8090;
            proxy_pass         $vlm_upstream/models;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location = /detect-services {
            set                $vlm_upstream https://vlm-webui:8090;
            proxy_pass         $vlm_upstream/detect-services;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /images/ {
            set                $vlm_upstream https://vlm-webui:8090;
            proxy_pass         $vlm_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/rtsp/ {
            set                $vlm_upstream https://vlm-webui:8090;
            proxy_pass         $vlm_upstream$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Next.js 前端（所有其他路由）────────────────────────────
        location / {
            proxy_pass         http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Next.js HMR WebSocket
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_cache_bypass $http_upgrade;
        }
    }
}
